name: CI Pipeline (Build and Test)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
    
    - name: Restore dependencies
      run: dotnet restore src/AzdAspire.sln
    
    - name: Build
      run: dotnet build src/AzdAspire.sln --configuration Release --no-restore
    
    - name: Run tests with coverage
      run: dotnet test src/AzdAspire.sln --configuration Release --no-build --verbosity normal --results-directory ./test-results --collect:"XPlat Code Coverage"
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./test-results/*.trx
        retention-days: 7

    - name: Generate coverage report
      uses: danielpalme/ReportGenerator-GitHub-Action@v5
      with:
        reports: ./test-results/**/coverage.cobertura.xml
        targetdir: ./coverage-report
        reporttypes: HtmlInline;Cobertura

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: ./coverage-report
        retention-days: 7