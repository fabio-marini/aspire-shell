name: LZ Pipeline (Provision landing zone)

on:
  workflow_dispatch:

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read
  deployments: write


jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # required for auth
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      # required to provision
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: | 
            8.x
            9.x
            10.x

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Provision Infrastructure
        run: azd provision --no-prompt

      - name: Create GitHub Environment
        run: |
          $envName = $Env:AZURE_ENV_NAME
          $repoOwner = "${{ github.repository }}".Split('/')[0]
          $repoName = "${{ github.repository }}".Split('/')[1]
          
          gh api repos/$repoOwner/$repoName/environments/$envName 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "GitHub environment already exists: $envName"
          } else {
            gh api repos/$repoOwner/$repoName/environments/$envName --method PUT
            Write-Host "Created GitHub environment: $envName"
          }
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy azd variables to GitHub Environment
        run: |
          $envName = $Env:AZURE_ENV_NAME
          $repoOwner = "${{ github.repository }}".Split('/')[0]
          $repoName = "${{ github.repository }}".Split('/')[1]
          $envFilePath = ".azure/$envName/.env"
          
          if (-not (Test-Path $envFilePath)) {
            Write-Host "Warning: .env file not found at $envFilePath"
            exit 0
          }
          
          $envContent = Get-Content $envFilePath -Raw
          $lines = $envContent -split [System.Environment]::NewLine | Where-Object { $_ -match '^\s*[^#\s]' }
          
          foreach ($line in $lines) {
            $line = $line.Trim()
            if ([string]::IsNullOrEmpty($line) -or $line.StartsWith("#")) {
              continue
            }
            
            $parts = $line -split '=', 2
            if ($parts.Count -eq 2) {
              $key = $parts[0].Trim()
              $value = $parts[1].Trim().Trim('"', "'")
              
              gh api repos/$repoOwner/$repoName/environments/$envName/variables `
                -f name=$key `
                -f value="$value" `
                --method PUT | Out-Null
              
              Write-Host "✓ Set variable: $key"
            }
          }
          
          Write-Host "All azd variables copied to GitHub environment: $envName"
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

